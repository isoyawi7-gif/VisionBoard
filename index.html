<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ISO YAWI VISION BOARD</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#020617,#1e3a8a,#0ea5e9);
min-height:100vh;
padding:30px;
color:white;
}


/* HEADER */

header{

background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
padding:25px;
border-radius:25px;
box-shadow:0 15px 40px rgba(0,0,0,.3);
margin-bottom:30px;

}


.profile{

display:flex;
align-items:center;
gap:30px;
flex-wrap:wrap;

}


.profile img{

width:150px;
height:150px;
border-radius:50%;
object-fit:cover;
border:5px solid white;
background:white;

}


.profile h1{

font-size:42px;
letter-spacing:2px;

}


.profile p{

font-size:18px;
margin-top:10px;
opacity:.8;

}


/* BUTTONS */


.uploadBtn{

display:inline-block;
background:#facc15;
color:#111827;
padding:14px 25px;
border-radius:12px;
font-weight:bold;
cursor:pointer;
margin-top:15px;
transition:.3s;

}


.uploadBtn:hover{

transform:scale(1.05);

}


input[type=file]{

display:none;

}


/* BOARD */

#board{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:25px;

}


.card{

background:white;
color:black;
border-radius:20px;
overflow:hidden;
position:relative;
box-shadow:0 15px 35px rgba(0,0,0,.4);
animation:show .5s;

}


.card img{

width:100%;
height:230px;
object-fit:cover;

}


.content{

padding:20px;

}


.content input{

width:100%;
font-size:24px;
font-weight:bold;
border:none;
outline:none;
margin-bottom:10px;

}


.content textarea{

width:100%;
height:100px;
border:none;
outline:none;
resize:none;
font-size:16px;

}


.delete{

position:absolute;
right:15px;
top:15px;

width:40px;
height:40px;

border:none;
border-radius:50%;

background:red;
color:white;

font-size:22px;
cursor:pointer;

}


@keyframes show{

from{

opacity:0;
transform:translateY(30px);

}

to{

opacity:1;
transform:translateY(0);

}

}


footer{

text-align:center;
margin-top:40px;
opacity:.8;

}


@media(max-width:700px){

.profile{

flex-direction:column;
text-align:center;

}


.profile h1{

font-size:28px;

}

}

</style>

</head>


<body>
