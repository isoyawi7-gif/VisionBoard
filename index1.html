<!DOCTYPE html>
<html>
<head>

<title>ISO YAWI Vision Board Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{

margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(135deg,#020617,#1d4ed8,#06b6d4);

font-family:Segoe UI,Arial;

}


.login-box{

background:white;

padding:40px;

width:350px;

border-radius:20px;

box-shadow:0 15px 40px #0008;

text-align:center;

}


h1{

color:#1e3a8a;

}


input{

width:90%;

padding:14px;

margin:10px;

border-radius:10px;

border:1px solid #ccc;

font-size:16px;

}


button{

background:#1d4ed8;

color:white;

border:none;

padding:14px 40px;

border-radius:10px;

font-size:18px;

cursor:pointer;

}


button:hover{

background:#0ea5e9;

}


#error{

color:red;

margin-top:10px;

}

</style>

</head>


<body>


<div class="login-box">


<h1>
🌟 ISO YAWI
</h1>

<h3>
Vision Board Login
</h3>


<input 
type="text"
id="username"
placeholder="Username">


<input 
type="password"
id="password"
placeholder="Password">


<button onclick="login()">

Login

</button>


<p id="error"></p>


</div>




<script>


function login(){


let user=document.getElementById("username").value;

let pass=document.getElementById("password").value;



if(user==="Admin" && pass==="Admin123"){


localStorage.setItem("loggedIn","true");


window.location.href="index.html";


}

else{


document.getElementById("error").innerHTML=
"Invalid Username or Password";


}


}



</script>


</body>
</html>
