<!DOCTYPE html>
<html>
<head>

<title>ISO YAWI VISION BOARD</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

*{
box-sizing:border-box;
font-family:Segoe UI,Arial;
}

body{
margin:0;
padding:25px;
background:linear-gradient(135deg,#020617,#1d4ed8,#06b6d4);
min-height:100vh;
color:white;
}

header{
background:rgba(255,255,255,.15);
backdrop-filter:blur(15px);
padding:25px;
border-radius:20px;
display:flex;
align-items:center;
gap:25px;
box-shadow:0 10px 30px #0005;
}

.profile{
width:130px;
height:130px;
border-radius:50%;
object-fit:cover;
border:5px solid white;
}

h1{
font-size:40px;
margin:0;
}

p{
font-size:18px;
}

.btn{

background:#facc15;
color:black;
padding:12px 20px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
display:inline-block;
margin-top:10px;

}

input[type=file]{
display:none;
}


#board{

margin-top:30px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;

}


.card{

background:white;
color:black;
border-radius:20px;
overflow:hidden;
position:relative;
box-shadow:0 10px 25px #0007;

}


.card img{
width:100%;
height:auto;
max-height:350px;
object-fit:contain;
background:white;
}

.card div{

padding:15px;

}


.card input,
.card textarea{

width:100%;
border:none;
outline:none;

}


.card input{

font-size:22px;
font-weight:bold;

}


.card textarea{

height:80px;

}


.delete{

position:absolute;
right:10px;
top:10px;

background:red;
color:white;

border:none;
border-radius:50%;

width:35px;
height:35px;

cursor:pointer;

font-size:20px;

}


footer{

text-align:center;
margin-top:40px;

}

</style>

</head>


<body>


<header>

<img id="photo" class="profile"
src="https://via.placeholder.com/150">


<div>

<h1>🌟 ISO YAWI VISION BOARD</h1>

<p>
Dream Big • Believe • Build • Achieve
</p>


<label class="btn">

📷 Upload My Photo

<input type="file" id="profileUpload">

</label>


</div>

</header>



<br>


<label class="btn">

➕ Add Vision

<input type="file" id="visionUpload">

</label>

<label class="btn" onclick="logout()">
🚪 Logout
</label>

<div id="board"></div>


<footer>
Made with Vision & Purpose
</footer>



<script>


// LOGIN SECURITY

if(localStorage.getItem("loggedIn")!=="true"){

window.location.href="login.html";

}


let board=document.getElementById("board");
let visions=JSON.parse(localStorage.getItem("visions"))||[];


function save(){

localStorage.setItem(
"visions",
JSON.stringify(visions)
);

}



function display(){

board.innerHTML="";


visions.forEach((v,i)=>{


let card=document.createElement("div");

card.className="card";


card.innerHTML=`

<button class="delete">×</button>

<img src="${v.image}">

<div>

<input value="${v.title}"
onchange="titleChange(${i},this.value)">


<textarea
onchange="descChange(${i},this.value)">
${v.desc}</textarea>

<p style="margin-top:15px;color:#64748b;font-size:14px;">
📅 Created:
${v.date || "No date recorded"}
</p>


</div>

`;


card.querySelector(".delete").onclick=function(){

visions.splice(i,1);

save();

display();

};


board.appendChild(card);


});


}



function titleChange(i,value){

visions[i].title=value;

save();

}



function descChange(i,value){

visions[i].desc=value;

save();

}



document.getElementById("visionUpload")
.onchange=function(e){


let file=e.target.files[0];


let reader=new FileReader();


reader.onload=function(){


visions.push({

image:reader.result,

title:"My Dream",

desc:"Write your vision...",

date:new Date().toLocaleString()

});


save();

display();


};


reader.readAsDataURL(file);


};




document.getElementById("profileUpload")
.onchange=function(e){


let file=e.target.files[0];


let reader=new FileReader();


reader.onload=function(){


document.getElementById("photo").src=reader.result;


localStorage.setItem(
"profile",
reader.result
);


};


reader.readAsDataURL(file);


};



let old=localStorage.getItem("profile");

if(old){

document.getElementById("photo").src=old;

}


display();

function logout(){

localStorage.removeItem("loggedIn");

window.location.href="index.html";

}
</script>


</body>
</html>
